sentence=A lightweight mixed-radix FFT library for Arduino and ESP32.
paragraph=KISS FFT (Keep It Simple, Stupid) converts time-domain signals into the frequency domain, enabling audio analysis, vibration sensing, pitch detection, and real-time spectrum visualization. This Arduino port wraps the original C library by Mark Borgerding with a clean C++ class, built-in windowing (Hann, Hamming), magnitude spectrum output, dominant frequency detection, and I2S microphone support for ESP32.
